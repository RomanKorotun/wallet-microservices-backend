name: Auth Service CI

on:
  pull_request:
    branches:
      - main
    paths:
      - services/auth-service/**
      - .github/workflows/auth-ci.yml
  push:
    branches:
      - main
    paths:
      - services/auth-service/**
      - .github/workflows/auth-ci.yml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run lint
        run: ./services/auth-service/scripts/lint.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run unit test
        run: ./services/auth-service/scripts/unit-test.sh

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_AUTH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_AUTH }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_AUTH }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Build E2E test image
        run: docker build --target e2e -t auth-service:e2e ./services/auth-service

      - name: Run E@E test in container
        run: |
          docker run --rm --network host \
            -e DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER_AUTH }}:${{ secrets.POSTGRES_PASSWORD_AUTH }}@localhost:5432/${{ secrets.POSTGRES_DB_AUTH }}?schema=public \
            -e JWT_ACCESS_TOKEN_SECRET=${{ secrets.JWT_ACCESS_TOKEN_SECRET }} \
            -e JWT_ACCESS_TOKEN_TIME=${{ secrets.JWT_ACCESS_TOKEN_TIME }} \
            -e JWT_REFRESH_TOKEN_SECRET=${{ secrets.JWT_REFRESH_TOKEN_SECRET }} \
            -e JWT_REFRESH_TOKEN_TIME=${{ secrets.JWT_REFRESH_TOKEN_TIME }} \
            -e REDIS_USE_TLS_AUTH=${{ secrets.REDIS_USE_TLS_AUTH }} \
            -e REDIS_URL_AUTH=${{ secrets.REDIS_URL_AUTH }} \
            auth-service:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run build
        run: ./services/auth-service/scripts/build.sh

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run docker build & push
        env:
          DOCKERHUB_USERNAME: ${{secrets.DOCKERHUB_USERNAME}}
          DOCKERHUB_TOKEN: ${{secrets.DOCKERHUB_TOKEN}}
        run: ./services/auth-service/scripts/docker-build-push.sh
