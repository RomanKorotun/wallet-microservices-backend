  #           -e REDIS_URL_AUTH=${{ secrets.REDIS_URL_AUTH }} \
  #           auth-service:e2e

    e2e-tests:
    ame: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create .env.test
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER_AUTH }}:${{ secrets.POSTGRES_PASSWORD_AUTH }}@postgres:5432/${{ secrets.POSTGRES_DB_AUTH }}?schema=public" > ./services/auth-service/.env.test
          echo "JWT_ACCESS_TOKEN_SECRET=${{ secrets.JWT_ACCESS_TOKEN_SECRET }}" >> ./services/auth-service/.env.test
          echo "JWT_ACCESS_TOKEN_TIME=${{ secrets.JWT_ACCESS_TOKEN_TIME }}" >> ./services/auth-service/.env.test
          echo "JWT_REFRESH_TOKEN_SECRET=${{ secrets.JWT_REFRESH_TOKEN_SECRET }}" >> ./services/auth-service/.env.test
          echo "JWT_REFRESH_TOKEN_TIME=${{ secrets.JWT_REFRESH_TOKEN_TIME }}" >> ./services/auth-service/.env.test
          echo "REDIS_USE_TLS_AUTH=${{secrets.REDIS_USE_TLS_AUTH}}" >> ./services/auth-service/.env.test
          echo "REDIS_URL_AUTH=${{ secrets.REDIS_URL_AUTH }}" >> ./services/auth-service/.env.test

      - name: Run E2E tests with docker-compose
        working-directory: ./services/auth-service
        run: |
          docker compose -f docker-compose.e2e.yml -p auth-service-test up --build -d
          docker compose -f docker-compose.e2e.yml -p auth-service-test logs -f auth-service-test
          docker compose -f docker-compose.e2e.yml -p auth-service-test down -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run build
        run: |
          chmod +x ./services/auth-service/scripts/build.sh
          ./services/auth-service/scripts/build.sh

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run docker build & push
        env:
          DOCKERHUB_USERNAME: ${{secrets.DOCKERHUB_USERNAME}}
          DOCKERHUB_TOKEN: ${{secrets.DOCKERHUB_TOKEN}}
        run: |
          chmod +x ./services/auth-service/scripts/docker-build-push.sh
          ./services/auth-service/scripts/docker-build-push.sh
