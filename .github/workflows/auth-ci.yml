name: Auth Service CI

on:
  pull_request:
    branches:
      - main
    paths:
      - services/auth-service/**
      - .github/workflows/auth-ci.yml
  push:
    branches:
      - main
    paths:
      - services/auth-service/**
      - .github/workflows/auth-ci.yml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run lint
        run: |
          chmod +x ./services/auth-service/scripts/lint.sh
          ./services/auth-service/scripts/lint.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Run unit test
        run: |
          chmod +x ./services/auth-service/scripts/unit-test.sh
          ./services/auth-service/scripts/unit-test.sh

