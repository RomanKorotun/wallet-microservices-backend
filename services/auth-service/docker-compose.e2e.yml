services:
  auth-service:
    image: auth-service-test:e2e
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e
    env_file:
      - .env.test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devuser
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'devuser']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 2s
      retries: 5
